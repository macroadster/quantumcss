<html>
<head>
<style>
:root {
  --hue: 210;
}

body {
  background: repeating-linear-gradient(#F0F0F0, #F0F0F0 4px, #FFFFFF 4px, #FFFFFF 8px);
  height: 100vh;
  width: 100vw;
  display: grid;
  place-content: center center;
  column-gap: 2rem;
  row-gap: 2rem;
}

.controls {
  grid-row: 2;
  display: flex;
  align-items: center;
  gap: 1rem;
  font-family: system-ui;
  font-size: 1rem;
}

button {
  grid-row: 1;
  font-size: 3rem;
  font-family: "myriad-pro", system-ui;
  height: 1.75em;
  padding: 0 2em;
  min-width: 6em;
  border-radius: 1000px;
  position: relative;
  overflow: hidden;
  cursor: default;
  outline: none;
  border: none;
}

button.primary {
  background: linear-gradient(
    hsl(var(--hue), 80%, 35%), 
    hsl(var(--hue), 70%, 50%), 
    hsl(var(--hue), 80%, 55%)
  );
  box-shadow: 0 0.375em 0.5em rgba(0, 0, 0, 0.3), 
              0 0.125em 0.125em hsl(var(--hue), 80%, 40%), 
              inset 0 0.25em 0.5em hsl(var(--hue), 90%, 15%),
              inset 0 0.375em 0.5em 0.25em hsl(var(--hue), 80%, 40%)
}

button.primary:focus,
button.primary:active {
  box-shadow: 0 0.375em 0.5em rgba(0, 0, 0, 0.3), 
              0 0.125em 0.125em hsl(var(--hue), 80%, 40%), 
              inset 0 0.25em 0.5em hsl(var(--hue), 90%, 15%),
              inset 0 0.375em 0.5em 0.25em hsl(var(--hue), 80%, 40%),
              0 0 0.5em hsl(var(--hue), 80%, 50%);
}

button.secondary {
  background: linear-gradient(rgba(160, 160, 160, 0.625), rgba(255, 255, 255, 0.625));
  box-shadow: 0 0.375em 0.5em rgba(0, 0, 0, 0.2), 
              0 0.125em 0.125em rgba(0, 0, 0, 0.3),  
              inset 0 0.25em 0.25em rgba(0, 0, 0, 0.4),
              inset 0 0.375em 0.5em 0.25em #BBBBBB;
}

button.secondary:focus,
button.secondary:active {
  box-shadow: 0 0.375em 0.5em rgba(0, 0, 0, 0.2), 
              0 0.125em 0.125em rgba(0, 0, 0, 0.3),  
              inset 0 0.25em 0.25em rgba(0, 0, 0, 0.4),
              inset 0 0.375em 0.5em 0.25em #BBBBBB,
              0 0 0.5em rgba(0, 0, 0, 0.25);
}

/* top shine */
button:before {
  content: '';
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  height: 33%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.4) 100%);
  width: calc(100% - 0.875em);
  border-radius: 2em 2em 0.5em 0.5em;
  top: 5%;
  z-index: 2;
}

/* bottom glow */
button:after {
  content: '';
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  height: 33%;
  background: linear-gradient(rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.5));
  width: calc(100% - 1.25em);
  border-radius: 0.75em;
  bottom: 10%;
  filter: blur(3px);
}

/* text */
button span {
  position: relative;
  top: -1px;
  z-index: 1;  
  letter-spacing: 0.0375em;
  -webkit-text-stroke-width: 0.025em;
  -webkit-text-stroke-color: #000000;
}

button.primary span {
  text-shadow: 0 0.25em 0.2em hsl(var(--hue), 70%, 35%);
}

button.secondary span {
  text-shadow: 0 0.25em 0.2em rgba(0, 0, 0, 0.25);
}
</style>
</head>
<body>
<div class="controls">
  <label>Hue:</label>
  <input type="range" min="0" max="360" value="210" id="hueSlider">
</div>
<button class="secondary"><span>Cancel</span></button>
<button class="primary"><span>Save</span></button>

<script>
const slider = document.getElementById('hueSlider');
slider.addEventListener('input', (e) => {
  document.documentElement.style.setProperty('--hue', e.target.value);
});
</script>
</body>
</html>
